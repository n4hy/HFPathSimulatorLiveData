AWSTemplateFormatVersion: '2010-09-09'
Description: 'HF Path Simulator - AWS CloudFormation Stack with GPU Support'

Parameters:
  EnvironmentName:
    Description: Environment name (dev, staging, prod)
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

  InstanceType:
    Description: EC2 instance type with GPU
    Type: String
    Default: g4dn.xlarge
    AllowedValues:
      - g4dn.xlarge    # T4 GPU (16GB) - Development
      - g4dn.2xlarge   # T4 GPU + more CPU/RAM
      - g5.xlarge      # A10G GPU (24GB) - Production
      - g5.2xlarge     # A10G GPU + more CPU/RAM

  VpcCIDR:
    Description: VPC CIDR block
    Type: String
    Default: 10.0.0.0/16

  PublicSubnetCIDR:
    Description: Public subnet CIDR
    Type: String
    Default: 10.0.1.0/24

  KeyPairName:
    Description: EC2 Key Pair name
    Type: AWS::EC2::KeyPair::KeyName

  DockerImage:
    Description: Docker image URI
    Type: String
    Default: hfpathsim:latest

Mappings:
  RegionAMI:
    # Amazon Linux 2 with NVIDIA drivers
    us-east-1:
      AMI: ami-0c02fb55956c7d316
    us-west-2:
      AMI: ami-00ee4df451840fa9d
    eu-west-1:
      AMI: ami-0d71ea30463e0ff8d

Resources:
  # VPC
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCIDR
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-hfpathsim-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-hfpathsim-igw

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      InternetGatewayId: !Ref InternetGateway
      VpcId: !Ref VPC

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetCIDR
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-hfpathsim-public

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-hfpathsim-public-rt

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  # Security Group
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${EnvironmentName}-hfpathsim-sg
      GroupDescription: Security group for HF Path Simulator
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        # HTTP
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        # HTTPS
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        # API (direct access)
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
        # ZMQ ports
        - IpProtocol: tcp
          FromPort: 5555
          ToPort: 5556
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-hfpathsim-sg

  # IAM Role for EC2
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-hfpathsim-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub ${EnvironmentName}-hfpathsim-profile
      Roles:
        - !Ref InstanceRole

  # EC2 Instance
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref InstanceSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 100
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # Install Docker
          yum update -y
          amazon-linux-extras install docker -y
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

          # Install Docker Compose
          curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          chmod +x /usr/local/bin/docker-compose

          # Install NVIDIA Container Toolkit
          distribution=$(. /etc/os-release;echo $ID$VERSION_ID)
          curl -s -L https://nvidia.github.io/nvidia-docker/amazon-linux2/nvidia-docker.repo | tee /etc/yum.repos.d/nvidia-docker.repo
          yum clean expire-cache
          yum install -y nvidia-container-toolkit
          systemctl restart docker

          # Pull and run HF Path Simulator
          docker pull ${DockerImage}
          docker run -d \
            --name hfpathsim \
            --gpus all \
            -p 8000:8000 \
            -p 5555:5555 \
            -p 5556:5556 \
            --restart unless-stopped \
            ${DockerImage}

      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-hfpathsim

  # Elastic IP
  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-hfpathsim-eip

  ElasticIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      EIP: !Ref ElasticIP
      InstanceId: !Ref Instance

Outputs:
  InstanceId:
    Description: Instance ID
    Value: !Ref Instance

  PublicIP:
    Description: Public IP address
    Value: !Ref ElasticIP

  APIEndpoint:
    Description: API endpoint URL
    Value: !Sub http://${ElasticIP}:8000

  WebDashboard:
    Description: Web dashboard URL
    Value: !Sub http://${ElasticIP}

  SSHCommand:
    Description: SSH command
    Value: !Sub ssh -i ${KeyPairName}.pem ec2-user@${ElasticIP}
