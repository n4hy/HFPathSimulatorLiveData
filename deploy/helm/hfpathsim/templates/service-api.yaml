apiVersion: v1
kind: Service
metadata:
  name: {{ include "hfpathsim.api.serviceName" . }}
  labels:
    {{- include "hfpathsim.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
    - name: zmq-input
      port: {{ .Values.api.service.zmqInputPort }}
      targetPort: zmq-input
      protocol: TCP
    - name: zmq-output
      port: {{ .Values.api.service.zmqOutputPort }}
      targetPort: zmq-output
      protocol: TCP
  selector:
    {{- include "hfpathsim.api.selectorLabels" . | nindent 4 }}
